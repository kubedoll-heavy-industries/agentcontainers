[tools]
goreleaser = "latest"
"ubi:golangci/golangci-lint" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"ubi:air-verse/air" = "latest"

[tasks.fmt]
run = "gofmt -l -w -s ./"

[tasks.vet]
run = "go vet ./..."

[tasks.lint]
depends = ["vet", "fmt"]
run = "mise exec -- golangci-lint run --modules-download-mode readonly --timeout=10m"

[tasks.test]
run = "go test -race ./..."
description = "Run unit tests"

[tasks."test:integration"]
run = "go test -race -tags=integration ./internal/integration/..."
description = "Run integration tests"

[tasks."test:adversarial"]
run = "env GOCACHE=${GOCACHE:-/tmp/go-build} go test ./internal/adversarial"
description = "Run unit-level adversarial dogfood harness tests"

[tasks."test:adversarial:integration"]
run = "env GOCACHE=${GOCACHE:-/tmp/go-build} go test -race -tags=integration -run TestAdversarial -count=1 ./internal/integration"
description = "Run Docker-backed adversarial dogfood scenarios"

[tasks."test:integration:ts"]
run = "npm ci --prefix test/integration && env AC_ENFORCER_IMAGE=${AC_ENFORCER_IMAGE:-agentcontainer-enforcer:verify} npm test --prefix test/integration"
description = "Run TypeScript testcontainers integration tests"

[tasks."test:dogfood"]
depends = ["test:adversarial", "test:adversarial:integration"]
description = "Run adversarial dogfood harnesses"

[tasks."redteam:codex"]
depends = ["build"]
run = "env GOCACHE=${GOCACHE:-/tmp/go-build} go run ./cmd/agentcontainer-redteam-codex"
description = "Create a disposable locked-down container for Codex escape testing"

[tasks."test:all"]
depends = ["test", "test:integration"]
description = "Run all tests"

[tasks."test:cover"]
run = "go test -race -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html"
description = "Run tests with coverage"

[tasks.build]
run = "go build -o tmp/agentcontainer ./cmd/agentcontainer"

[tasks.dev]
run = "air"

[tasks."enforcer:test"]
run = "docker compose -f enforcer/docker-compose.test.yml run --rm --build test"
description = "Run all enforcer tests in a privileged container (includes BPF integration)"

[tasks."enforcer:test:bpf"]
run = "docker compose -f enforcer/docker-compose.test.yml run --rm --build test-bpf-only"
description = "Run BPF integration tests only in a privileged container"
