name: integration tests

on:
  push:
    branches: [main]
    paths:
      - 'enforcer/**'
      - 'internal/cli/run.go'
      - 'internal/cli/exec.go'
      - 'internal/cli/build.go'
      - 'internal/cli/policy.go'
      - 'internal/cli/policy_channel.go'
      - 'internal/container/**'
      - 'internal/adversarial/**'
      - 'internal/orgpolicy/extract.go'
      - 'internal/oci/fetch.go'
      - 'internal/oci/push.go'
      - 'internal/enforcement/grpc.go'
      - 'internal/sidecar/**'
      - 'internal/secrets/**'
      - 'test/adversarial/**'
      - 'test/integration/**'
      - '.mise.toml'
  pull_request:
    paths:
      - 'enforcer/**'
      - 'internal/cli/run.go'
      - 'internal/cli/exec.go'
      - 'internal/cli/build.go'
      - 'internal/cli/policy.go'
      - 'internal/cli/policy_channel.go'
      - 'internal/container/**'
      - 'internal/adversarial/**'
      - 'internal/orgpolicy/extract.go'
      - 'internal/oci/fetch.go'
      - 'internal/oci/push.go'
      - 'internal/enforcement/grpc.go'
      - 'internal/sidecar/**'
      - 'internal/secrets/**'
      - 'test/adversarial/**'
      - 'test/integration/**'
      - '.mise.toml'
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read

jobs:
  integration:
    name: integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: jdx/mise-action@v3
        with:
          install: true

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            enforcer:
              - 'enforcer/**'

      - name: Pull pre-built enforcer image
        if: steps.changes.outputs.enforcer != 'true'
        run: docker pull ghcr.io/kubedoll-heavy-industries/agentcontainer-enforcer:latest

      - name: Build enforcer image (enforcer changed)
        if: steps.changes.outputs.enforcer == 'true'
        run: docker build -t ghcr.io/kubedoll-heavy-industries/agentcontainer-enforcer:latest enforcer/

      - name: Run integration tests
        run: mise run test:integration

      - name: Run adversarial dogfood tests
        env:
          AC_ADVERSARIAL_ENFORCER_IMAGE: ghcr.io/kubedoll-heavy-industries/agentcontainer-enforcer:latest
        run: mise run test:dogfood
